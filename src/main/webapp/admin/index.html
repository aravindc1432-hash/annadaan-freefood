<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AnnaDaan Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Hind',sans-serif;background:#f5f5f5;color:#222}
  .header{background:#E55A00;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between}
  .header h1{color:#fff;font-size:20px}
  .header a{color:rgba(255,255,255,.8);font-size:13px;text-decoration:none}
  .container{max-width:1100px;margin:0 auto;padding:24px 16px}
  .login-card{max-width:380px;margin:80px auto;background:#fff;border-radius:12px;padding:32px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
  .fg{margin-bottom:14px}
  .fg label{display:block;font-size:12px;font-weight:600;color:#666;margin-bottom:5px}
  .fg input{width:100%;padding:9px 12px;border:1.5px solid #ddd;border-radius:7px;font-size:14px;font-family:inherit}
  .btn-p{background:#E55A00;color:#fff;border:none;padding:10px 20px;border-radius:7px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;width:100%}
  .err{background:#fff5f5;color:#c0392b;border:1px solid #ffcdd2;border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:12px;display:none}
  .tabs{display:flex;gap:4px;margin-bottom:20px;background:#fff;border-radius:10px;padding:6px;border:1px solid #e0e0e0;width:fit-content}
  .tab{padding:8px 18px;border-radius:7px;border:none;font-size:13px;font-weight:500;cursor:pointer;background:none;font-family:inherit;color:#666}
  .tab.active{background:#E55A00;color:#fff}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:24px}
  .stat-box{background:#fff;border-radius:10px;padding:18px;border:1px solid #e0e0e0}
  .stat-box .n{font-size:28px;font-weight:700;color:#E55A00}
  .stat-box .l{font-size:12px;color:#888;margin-top:3px}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #e0e0e0}
  th{background:#f9f9f9;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#666;border-bottom:1px solid #e0e0e0}
  td{padding:10px 14px;font-size:13px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
  .bg{background:#e8f8ee;color:#27ae60} .bo{background:#fff3e8;color:#e55a00} .bgo{background:#fff8e1;color:#f39c12}
  .btn-del{background:#fff5f5;color:#c0392b;border:1px solid #ffcdd2;padding:4px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit}
  .hidden{display:none}
  input[type=text]{padding:8px 12px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit}
</style>
</head>
<body>
<div class="header">
  <h1>🍱 AnnaDaan Admin</h1>
  <div style="display:flex;align-items:center;gap:16px">
    <span id="adminGreet" style="color:rgba(255,255,255,.85);font-size:13px"></span>
    <a href="../">← App</a>
    <a href="#" id="aLogout">Logout</a>
  </div>
</div>

<div class="container" id="loginSection">
  <div class="login-card">
    <h2 style="margin-bottom:20px">🔐 Admin Login</h2>
    <div class="err" id="loginErr"></div>
    <div class="fg"><label>Username</label><input type="text" id="lUser" value="admin"/></div>
    <div class="fg"><label>Password</label><input type="password" id="lPass" placeholder="admin123"/></div>
    <button class="btn-p" id="btnAdminLogin">Login</button>
    <p style="margin-top:12px;font-size:11px;color:#999">Default credentials: admin / admin123 — change after first login</p>
  </div>
</div>

<div class="container hidden" id="dashboard">
  <div class="tabs">
    <button class="tab active" data-tab="overview">📊 Overview</button>
    <button class="tab" data-tab="events">📋 Events</button>
    <button class="tab" data-tab="users">👥 Users</button>
  </div>
  <div id="tab-overview"><div class="stats-grid" id="statsGrid"></div></div>
  <div id="tab-events" class="hidden">
    <div style="margin-bottom:14px">
      <input type="text" id="evSearch" placeholder="Search events…" style="width:280px"/>
    </div>
    <table><thead><tr><th>ID</th><th>Food</th><th>Provider</th><th>City</th><th>Date</th><th>Timing</th><th>Going</th><th>Checkins</th><th>Type</th><th></th></tr></thead>
    <tbody id="evBody"></tbody></table>
  </div>
  <div id="tab-users" class="hidden">
    <table><thead><tr><th>ID</th><th>Username</th><th>Display Name</th><th>Phone</th><th>Role</th><th>Joined</th><th></th></tr></thead>
    <tbody id="usBody"></tbody></table>
  </div>
</div>

<script>
const BASE = window.location.origin + window.location.pathname.replace(/\/admin\/?.*$/, '');
const A = { AUTH: BASE+'/api/auth', ADMIN: BASE+'/api/admin' };
let evs=[], users=[];

document.addEventListener('DOMContentLoaded', async () => {
  try { const d=await get(A.AUTH+'/me'); if(d.loggedIn&&d.isAdmin){show(d.displayName);load();} } catch(e){}
  document.getElementById('btnAdminLogin').onclick = login;
  document.getElementById('lPass').onkeydown = e => { if(e.key==='Enter') login(); };
  document.getElementById('aLogout').onclick = async e => {
    e.preventDefault();
    await post(A.AUTH+'/logout',{});
    location.reload();
  };
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('[id^=tab-]').forEach(x=>x.classList.add('hidden'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.remove('hidden');
  });
  document.getElementById('evSearch').oninput = renderEvs;
});

async function login() {
  const err = document.getElementById('loginErr');
  err.style.display='none';
  try {
    const d = await post(A.AUTH+'/login', { username: document.getElementById('lUser').value, password: document.getElementById('lPass').value });
    if (d.success && d.isAdmin) { show(d.displayName); load(); }
    else { err.textContent = d.isAdmin===false?'Not an admin account':(d.error||'Login failed'); err.style.display='block'; }
  } catch(e) { err.textContent='Server error'; err.style.display='block'; }
}

function show(name) {
  document.getElementById('loginSection').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('adminGreet').textContent = '👤 '+name;
}

async function load() {
  const s = await get(A.ADMIN+'/stats');
  if (s.success) {
    document.getElementById('statsGrid').innerHTML = [
      ['Total Events',s.totalEvents,'📋'],['Total Users',s.totalUsers,'👥'],
      ['Going',s.totalGoing,'🙋'],['Checkins',s.totalCheckins,'✅'],['Witness Reports',s.witnessReports,'👁️']
    ].map(([l,n,i])=>`<div class="stat-box"><div class="n">${i} ${n}</div><div class="l">${l}</div></div>`).join('');
  }
  const ed = await get(A.ADMIN+'/events');
  if (ed.success) { evs=ed.events; renderEvs(); }
  const ud = await get(A.ADMIN+'/users');
  if (ud.success) { users=ud.users; renderUsers(); }
}

function renderEvs() {
  const q = document.getElementById('evSearch').value.toLowerCase();
  document.getElementById('evBody').innerHTML = evs
    .filter(e=>!q||[e.foodDescription,e.city,e.providerName].some(f=>f?.toLowerCase().includes(q)))
    .map(e=>`<tr>
      <td>${e.id}</td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.foodDescription)}</td>
      <td>${esc(e.providerName)}</td><td>${esc(e.city)},${esc(e.state)}</td>
      <td>${e.eventDate}</td><td>${e.startTime}–${e.endTime}</td>
      <td><span class="badge bg">🙋 ${e.goingCount}</span></td>
      <td><span class="badge bo">✅ ${e.checkinCount}</span></td>
      <td>${e.addedByWitness?'<span class="badge bgo">👁️ Witness</span>':'<span class="badge bg">📢 Direct</span>'}</td>
      <td><button class="btn-del" onclick="delEv(${e.id})">🗑</button></td>
    </tr>`).join('');
}

function renderUsers() {
  document.getElementById('usBody').innerHTML = users.map(u=>`<tr>
    <td>${u.id}</td><td>${esc(u.username)}</td><td>${esc(u.displayName)}</td>
    <td>${esc(u.phone||'—')}</td>
    <td>${u.isAdmin?'<span class="badge bo">Admin</span>':'<span class="badge bg">User</span>'}</td>
    <td style="font-size:11px">${u.createdAt||'—'}</td>
    <td>${u.isAdmin?'':'<button class="btn-del" onclick="delU('+u.id+')">🗑</button>'}</td>
  </tr>`).join('');
}

async function delEv(id){if(!confirm('Delete event #'+id+'?'))return;const d=await fetch(A.ADMIN+'/events/'+id,{method:'DELETE'}).then(r=>r.json());if(d.success){evs=evs.filter(e=>e.id!=id);renderEvs();}else alert(d.error||'Failed');}
async function delU(id){if(!confirm('Delete user #'+id+'?'))return;const d=await fetch(A.ADMIN+'/users/'+id,{method:'DELETE'}).then(r=>r.json());if(d.success){users=users.filter(u=>u.id!=id);renderUsers();}else alert(d.error||'Failed');}

async function get(url){return fetch(url).then(r=>r.json());}
async function post(url,b){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json());}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
